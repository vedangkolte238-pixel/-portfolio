<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        body{
            display: flex;
            flex-direction: column;
            height: 100vh;

        }
        header {
            color: #ffffff;
            background-color: black;
            margin-top: 0px;
            padding: 20px;
            text-align: center;
            width: 100%;
        }

        .content {
            color: #000000;
        }

        footer {
            position: absolute;
            color: white;
            background-color: black;
            bottom: 0;
            width: 100%;
            padding: 20px;
            text-align: center;
        }
        .side{
            background-color: rgb(255, 0, 0);
            color: #ffffff;
            width: 20%;
            height: 600px;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <header>Header</header>
    <div class = "side">side</div>
    <div class="content">Content</div>
    <footer>Footer</footer>
</body>

</html>
